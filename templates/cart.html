{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blipkart || Home</title>
    <link rel="stylesheet" href="{% static "cart.css" %}">
</head>
<body>
    <ul type="none">
        <a href="{% url "home" %}"><li class="nav">Home</li></a>
        <a href="{% url "cart" %}"><li id="cart" class="nav">Cart</li></a>
        <a href="{% url "account" %}"><li class="nav">account</li></a>
    </ul>
    {% for i in item %}
    <h1>{{ i.name }}</h1>
    {{ i.price }}
    {{ i.description }}
    <img src="{{ i.image.url }}" width='200px'>
    <a href="{% url "add_to_cart" i.id %}">add to cart</a>
    <a href="{% url 'remove_from_cart' i.id %}">Remove</a>
    {% empty %}
    <p>Cart is empty</p>
    {% endfor %}

    <h2>Total Price: ₹{{ total }}</h2>
</body>
</html>
