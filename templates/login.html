{% extends 'base.html' %}
{% load static %}

{% block title %}Blipkart | Login{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'auth.css' %}">{% endblock %}

{% block content %}
<section class="auth-shell reveal">
    <article class="auth-card card-glass">
        <p class="kicker">Welcome back</p>
        <h1>Login to your account</h1>
        <form method="post" class="auth-form">
            {% csrf_token %}
            <label>Email
                <input type="email" name="email" placeholder="you@example.com" required>
            </label>
            <label>Password
                <div class="password-wrap">
                    <input type="password" name="password" placeholder="Enter password" required>
                    <button type="button" class="toggle-pass">Show</button>
                </div>
            </label>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>
        <p class="auth-meta">New here? <a href="/register/">Create account</a></p>
    </article>
</section>
{% endblock %}
